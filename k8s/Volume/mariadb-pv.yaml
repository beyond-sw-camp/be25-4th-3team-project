apiVersion: v1
kind: PersistentVolume
metadata:
  name: autosource-mariadb-pv
spec:
  capacity:
    storage: 2Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  # PersistentVolume이 더 이상 사용되지 않을 때 정책을 설정한다.
  persistentVolumeReclaimPolicy: Delete
  hostPath:
    path: /var/lib/autosource/mariadb
    type: DirectoryOrCreate
