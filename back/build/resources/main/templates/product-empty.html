<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5 text-center">
                    <h1 class="h3 fw-bold mb-3">Product page is not ready</h1>
                    <p class="text-secondary mb-4" th:text="${message} ?: 'No products are currently registered.'">
                        No products are currently registered.
                    </p>
                    <a href="/product/" class="btn btn-primary">Retry</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
