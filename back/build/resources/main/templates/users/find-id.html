<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>아이디 찾기</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }

        button {
            border: none;
            cursor: pointer;
            font-family: Arial, sans-serif;
        }

        .error-message {
            color: #dc3545;
            background: #f8d7da;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .success-message {
            color: #155724;
            background: #d4edda;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .login-id-list {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 15px;
            margin-top: 10px;
        }

        .login-id-item {
            padding: 8px 12px;
            margin: 5px 0;
            background: #ffffff;
            border-radius: 4px;
            font-weight: 600;
            color: #495057;
            border-left: 3px solid #28a745;
        }

        .login-id-item:first-child {
            margin-top: 0;
        }

        .login-id-item:last-child {
            margin-bottom: 0;
        }

        .main-btn {
            display: block;
            width: 100%;
            box-sizing: border-box;
            margin-top: 14px;
            padding: 14px;
            text-align: center;
            text-decoration: none;
            background-color: #f1f3f5;
            color: #495057;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
        }

        .main-btn:hover {
            background-color: #e9ecef;
        }

        .back-button-wrap { margin-bottom: 16px; }

        .back-button {
            background-color: #f1f3f5;
            color: #495057;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .back-button:hover {
            background-color: #e9ecef;
            color: #212529;
        }
    </style>
</head>
<body>
<div class="back-button-wrap">
    <button type="button" class="back-button" onclick="location.href='/users/login'">
        ← 이전 화면
    </button>
</div>

<h2>아이디 찾기</h2>

<div th:if="${errorMessage}" class="error-message" th:text="${errorMessage}"></div>
<div th:if="${successMessage}" class="success-message">
    <div th:text="${successMessage}"></div>
    <div th:if="${foundLoginIds}" class="login-id-list">
        <div th:each="loginId : ${foundLoginIds}" class="login-id-item" th:text="${loginId}"></div>
    </div>
</div>

<form th:action="@{/users/find-id}" method="post">
    <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" name="email" required>
    </div>

    <button type="submit" class="main-btn">아이디 찾기</button>
</form>
</body>
</html>
