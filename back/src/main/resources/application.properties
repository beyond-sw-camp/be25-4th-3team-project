server.port=${SERVER_PORT:8087}

management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health,info

spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/team3}
spring.datasource.driver-class-name=${DB_DRIVER:org.mariadb.jdbc.Driver}
spring.datasource.username=${DB_USERNAME:team3}
spring.datasource.password=${DB_PASSWORD:0000}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=${JPA_DATABASE_PLATFORM:org.hibernate.dialect.MariaDBDialect}

app.gateway-url=${APP_GATEWAY_URL:http://localhost:8081}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
app.auth.login-url=${APP_AUTH_LOGIN_URL:http://localhost:8080/users/login}
app.auth.signup-url=${APP_AUTH_SIGNUP_URL:http://localhost:8080/users/signup}
app.cookie.secure=${APP_COOKIE_SECURE:false}
app.cookie.same-site=${APP_COOKIE_SAME_SITE:Lax}

fastapi.translate.url=${FASTAPI_TRANSLATE_URL:http://localhost:8000/translate}
fastapi.translateImage.url=${FASTAPI_TRANSLATE_IMAGE_URL:http://localhost:8000/translateImage}
fastapi.sourcing.url=${FASTAPI_SOURCING_URL:http://localhost:8000/sourcing}
fastapi.autostart.enabled=${FASTAPI_AUTOSTART_ENABLED:true}
fastapi.autostart.working-dir=${FASTAPI_AUTOSTART_WORKING_DIR:../team3ProjectSourcing/Python-Backend}
fastapi.autostart.host=${FASTAPI_AUTOSTART_HOST:localhost}
fastapi.autostart.port=${FASTAPI_AUTOSTART_PORT:8000}
fastapi.autostart.python=${FASTAPI_AUTOSTART_PYTHON:}
fastapi.autostart.app-module=${FASTAPI_AUTOSTART_APP_MODULE:image_translate:app}
koreaexim.api.authkey=${KOREAEXIM_API_AUTHKEY:test-auth-key}
sourcing.processing.webhook-url=${SOURCING_PROCESSING_WEBHOOK_URL:}
sourcing.processing.default-market-code=${SOURCING_PROCESSING_DEFAULT_MARKET_CODE:COUPANG}

minio.enabled=${MINIO_ENABLED:false}
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.url=${MINIO_URL:http://localhost:9000}
minio.console-url=${MINIO_CONSOLE_URL:http://localhost:9001}
minio.access-key=${MINIO_ACCESS_KEY:test}
minio.secret-key=${MINIO_SECRET_KEY:test}
minio.bucket=${MINIO_BUCKET:test-bucket}
minio.bucket.sourcing=${MINIO_BUCKET_SOURCING:test-bucket}
minio.region=${MINIO_REGION:us-east-1}
minio.presigned-url-expire-minutes=${MINIO_PRESIGNED_URL_EXPIRE_MINUTES:30}

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:25}
spring.mail.username=${MAIL_USERNAME:test}
spring.mail.password=${MAIL_PASSWORD:test}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}

jwt.secret=${JWT_SECRET:0123456789abcdef0123456789abcdef}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:test-google}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:test-google-secret}
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID:test-kakao}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET:test-kakao-secret}
spring.security.oauth2.client.registration.kakao.provider=kakao
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,profile_image,account_email
spring.security.oauth2.client.registration.kakao.redirect-uri=${KAKAO_REDIRECT_URI:http://localhost:8081/login/oauth2/code/kakao}
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id
spring.security.oauth2.client.registration.naver.client-id=${NAVER_CLIENT_ID:test-naver}
spring.security.oauth2.client.registration.naver.client-secret=${NAVER_CLIENT_SECRET:test-naver-secret}
spring.security.oauth2.client.registration.naver.provider=naver
spring.security.oauth2.client.registration.naver.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.scope=name,email,profile_image
spring.security.oauth2.client.registration.naver.redirect-uri=${NAVER_REDIRECT_URI:http://localhost:8081/login/oauth2/code/naver}
spring.security.oauth2.client.registration.naver.client-name=Naver
spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response
