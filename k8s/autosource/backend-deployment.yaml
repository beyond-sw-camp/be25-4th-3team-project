apiVersion: apps/v1
kind: Deployment
metadata:
  name: autosource-api-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autosource-api
  template:
    metadata:
      labels:
        app: autosource-api
    spec:
      containers:
      - name: autosource-api
        image: leetrue801/autosource-back:18
        resources:
          requests:
            memory: "521Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1"
        ports:
        - containerPort: 8087
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: dev
        - name: SERVER_PORT
          value: "8087"
        - name: DB_URL
          value: jdbc:mariadb://autosource-mariadb-service:3306/team3
        - name: DB_USERNAME
          value: team3
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-secret
              key: MARIADB_PASSWORD
        - name: APP_CORS_ALLOWED_ORIGIN_PATTERNS
          value: http://localhost:18080,http://127.0.0.1:18080,http://localhost:18081,http://127.0.0.1:18081,https://*.ngrok-free.dev,https://*.vercel.app
        - name: APP_COOKIE_SECURE
          value: "false"
        - name: APP_COOKIE_SAME_SITE
          value: Lax
        startupProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8087
          failureThreshold: 30
          timeoutSeconds: 3
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8087
          initialDelaySeconds: 10
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8087
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 6
