<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>coupong</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f6f8; color: #1f2937; }
        .top-nav { background: #111827; padding: 14px 0; }
        .top-nav a { color: #fff; text-decoration: none; font-weight: 700; font-size: 1.25rem; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 16px; }
        .product-card { display: block; color: inherit; text-decoration: none; background: #fff; border-radius: 8px; overflow: hidden; border: 1px solid #e5e7eb; }
        .product-card:hover { border-color: #2563eb; }
        .product-card img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #f9fafb; }
        .product-body { padding: 14px; }
        .product-name { min-height: 42px; font-size: 0.95rem; line-height: 1.35; font-weight: 700; }
        .product-price { color: #dc2626; font-weight: 800; margin-top: 8px; }
    </style>
</head>
<body>
<nav class="top-nav">
    <div class="container">
        <a href="/product/">coupong</a>
    </div>
</nav>

<main class="container py-4">
    <div class="d-flex align-items-end justify-content-between gap-3 mb-3">
        <div>
            <h1 class="h3 fw-bold mb-1">Products</h1>
            <div class="text-secondary"
                 th:text="${#numbers.formatInteger(page.totalElements, 0, 'COMMA')} + ' products'">
                0 products
            </div>
        </div>
    </div>

    <div class="product-grid">
        <a class="product-card"
           th:each="p : ${page.products}"
           th:href="@{/product/{id}(id=${p.productId})}">
            <img th:src="${p.mainImageUrl != null and !#strings.isEmpty(p.mainImageUrl) ? p.mainImageUrl : 'https://via.placeholder.com/420x420?text=No+Image'}"
                 th:alt="${p.productName}">
            <div class="product-body">
                <div class="product-name" th:text="${p.productName}">Product name</div>
                <div class="product-price"
                     th:text="${p.salePrice != null ? #numbers.formatDecimal(p.salePrice, 0, 'COMMA', 0, 'POINT') + ' KRW' : 'Price unavailable'}">
                    Price
                </div>
            </div>
        </a>
    </div>

    <div class="d-flex align-items-center justify-content-center gap-3 mt-4"
         th:if="${page.totalPages > 1}">
        <a class="btn btn-outline-secondary"
           th:classappend="${!page.hasPrevious} ? ' disabled' : ''"
           th:href="${page.hasPrevious} ? @{/product/(page=${page.page - 1}, size=${page.size})} : '#'">
            Previous
        </a>
        <div class="text-secondary"
             th:text="${page.page + 1} + ' / ' + ${page.totalPages}">
            1 / 1
        </div>
        <a class="btn btn-outline-secondary"
           th:classappend="${!page.hasNext} ? ' disabled' : ''"
           th:href="${page.hasNext} ? @{/product/(page=${page.page + 1}, size=${page.size})} : '#'">
            Next
        </a>
    </div>
</main>
</body>
</html>
